## Workflow for building and deploying React + Vite + Appwrite to GitHub Pages
name: Deploy React App to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    environment: github-pages

    env:
      VITE_APPWRITE_ENDPOINT: ${{ vars.VITE_APPWRITE_ENDPOINT }}
      VITE_APPWRITE_PROJECT_ID: ${{ vars.VITE_APPWRITE_PROJECT_ID }}
      VITE_APPWRITE_DATABASE_ID: ${{ vars.VITE_APPWRITE_DATABASE_ID }}
      VITE_APPWRITE_COLLECTION_ID: ${{ vars.VITE_APPWRITE_COLLECTION_ID }}
      VITE_APPWRITE_BUCKET_ID: ${{ vars.VITE_APPWRITE_BUCKET_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Appwrite environment variables
        shell: bash
        run: |
          missing=0

          check_var() {
            local name="$1"
            local value="${!name}"
            if [ -z "$value" ]; then
              echo "❌ $name is missing"
              missing=1
            else
              echo "✅ $name is set"
            fi
          }

          check_var VITE_APPWRITE_ENDPOINT
          check_var VITE_APPWRITE_PROJECT_ID
          check_var VITE_APPWRITE_DATABASE_ID
          check_var VITE_APPWRITE_COLLECTION_ID
          check_var VITE_APPWRITE_BUCKET_ID

          if [ "$missing" -eq 1 ]; then
            echo "One or more Appwrite variables are missing. Check GitHub Actions Variables."
            exit 1
          fi

      - name: Build React app
        run: npm run build -- --base=/appwire-todo-app/

      - name: Add SPA fallback
        run: cp ./dist/index.html ./dist/404.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
